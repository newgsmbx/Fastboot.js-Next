<!doctype html>
<html lang="en" data-theme="system" data-resolved-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Fastboot.js Next is a Material Design 3 WebUSB fastboot toolkit for Chromium browsers."
    />
    <title>Fastboot.js Next</title>
    <script>
      (() => {
        const theme = localStorage.getItem("fastboot-next:theme") || "system";
        const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
        const resolved = theme === "system" ? (prefersDark ? "dark" : "light") : theme;
        document.documentElement.dataset.theme = theme;
        document.documentElement.dataset.resolvedTheme = resolved;
        const lang = localStorage.getItem("fastboot-next:locale") || (navigator.language && navigator.language.toLowerCase().startsWith("zh") ? "zh-CN" : "en-US");
        document.documentElement.lang = lang;
      })();
    </script>
  </head>
  <body>
    <fastboot-next-app></fastboot-next-app>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
